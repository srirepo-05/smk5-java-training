<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Employee – Employee Management</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1e293b;
        }

        /* ── Navbar ── */
        .navbar {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: #fff;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,.3);
        }
        .navbar .brand { font-size: 1.25rem; font-weight: 700; }
        .btn-back {
            padding: 7px 16px;
            background: rgba(255,255,255,.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,.3);
            border-radius: 6px;
            font-size: .85rem;
            text-decoration: none;
            transition: background .2s;
        }
        .btn-back:hover { background: rgba(255,255,255,.25); }

        /* ── Container ── */
        .container {
            max-width: 560px;
            margin: 48px auto;
            padding: 0 16px;
        }

        /* ── Card ── */
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,.1);
            padding: 40px 36px;
        }
        .card h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f3460;
            margin-bottom: 6px;
        }
        .card .description {
            font-size: .875rem;
            color: #64748b;
            margin-bottom: 28px;
        }

        /* ── Alerts ── */
        .alert {
            border-radius: 8px;
            padding: 11px 16px;
            font-size: .875rem;
            margin-bottom: 20px;
        }
        .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }

        /* ── Form ── */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: .875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: .95rem;
            color: #111827;
            background: #fff;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #0f3460;
            box-shadow: 0 0 0 3px rgba(15,52,96,.12);
        }
        .form-group .hint {
            font-size: .78rem;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* ── Salary preview box ── */
        .salary-preview {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: .9rem;
            color: #15803d;
            margin-bottom: 24px;
            display: none;
        }

        /* ── Buttons ── */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }
        .btn-submit {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #0f3460, #533483);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s;
        }
        .btn-submit:hover { opacity: .85; }
        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: .95rem;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: background .2s;
        }
        .btn-cancel:hover { background: #e2e8f0; }
    </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
    <div class="brand">🏢 Employee Management</div>
    <a th:href="@{/employees}" class="btn-back">← Back to Employees</a>
</nav>

<!-- ── Form Card ── -->
<div class="container">
    <div class="card">
        <h2>➕ Create New Employee</h2>
        <p class="description">
            Fill in the details below. Salary will be automatically assigned
            based on the selected designation.
        </p>

        <!-- Validation error message -->
        <div class="alert alert-error" th:if="${errorMessage}">
            ❌ <span th:text="${errorMessage}"></span>
        </div>

        <!-- Create Employee Form -->
        <form th:action="@{/employees/new}" th:object="${employeeRequest}" method="post">

            <!-- Name -->
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" th:field="*{name}"
                       placeholder="e.g. John Doe" required/>
                <p class="hint">⚠️ Maximum one space allowed (First name + Last name only)</p>
            </div>

            <!-- Age -->
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" th:field="*{age}"
                       placeholder="e.g. 25" min="19" max="60" required/>
                <p class="hint">Must be between 19 and 60</p>
            </div>

            <!-- Designation -->
            <div class="form-group">
                <label for="designation">Designation</label>
                <select id="designation" th:field="*{designation}"
                        required onchange="updateSalaryPreview(this.value)">
                    <option value="">-- Select a role --</option>
                    <option value="Programmer">Programmer</option>
                    <option value="Manager">Manager</option>
                    <option value="Tester">Tester</option>
                </select>
            </div>

            <!-- Dynamic salary preview -->
            <div class="salary-preview" id="salaryPreview">
                💰 Auto-assigned salary: <strong id="salaryValue"></strong>
            </div>

            <!-- Buttons -->
            <div class="btn-row">
                <button type="submit" class="btn-submit">✅ Create Employee</button>
                <a th:href="@{/employees}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Show a salary preview when the user picks a designation
    const salaries = {
        'Programmer': '₹20,000.00',
        'Manager':    '₹25,000.00',
        'Tester':     '₹15,000.00'
    };

    function updateSalaryPreview(designation) {
        const preview = document.getElementById('salaryPreview');
        const value   = document.getElementById('salaryValue');
        if (salaries[designation]) {
            value.textContent = salaries[designation];
            preview.style.display = 'block';
        } else {
            preview.style.display = 'none';
        }
    }
</script>

</body>
</html>
