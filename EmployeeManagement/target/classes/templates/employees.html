<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Employees – Employee Management</title>
    <style>
        /* ── Reset & base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1e293b;
        }

        /* ── Top navigation bar ── */
        .navbar {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: #fff;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,.3);
        }
        .navbar .brand {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: .3px;
        }
        .navbar .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .navbar .welcome {
            font-size: .875rem;
            opacity: .85;
        }
        .btn-logout {
            padding: 7px 16px;
            background: rgba(255,255,255,.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,.3);
            border-radius: 6px;
            font-size: .85rem;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,.25); }

        /* ── Page container ── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 36px 24px;
        }

        /* ── Page header ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }
        .page-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f3460;
        }
        .btn-primary {
            padding: 10px 22px;
            background: linear-gradient(135deg, #0f3460, #533483);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity .2s;
        }
        .btn-primary:hover { opacity: .85; }

        /* ── Flash alerts ── */
        .alert {
            border-radius: 10px;
            padding: 12px 18px;
            font-size: .9rem;
            margin-bottom: 24px;
        }
        .alert-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
        .alert-info    { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

        /* ── Stats cards ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 18px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            text-align: center;
        }
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f3460;
        }
        .stat-card .stat-label {
            font-size: .8rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* ── Table card ── */
        .table-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 10px rgba(0,0,0,.07);
            overflow: hidden;
        }
        .table-card table {
            width: 100%;
            border-collapse: collapse;
        }
        .table-card thead {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: #fff;
        }
        .table-card thead th {
            padding: 14px 18px;
            text-align: left;
            font-size: .85rem;
            font-weight: 600;
            letter-spacing: .5px;
            text-transform: uppercase;
        }
        .table-card tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: background .15s;
        }
        .table-card tbody tr:last-child { border-bottom: none; }
        .table-card tbody tr:hover { background: #f8fafc; }
        .table-card tbody td {
            padding: 14px 18px;
            font-size: .9rem;
            color: #334155;
        }

        /* ── Designation badge ── */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: .78rem;
            font-weight: 600;
        }
        .badge-programmer { background: #dbeafe; color: #1e40af; }
        .badge-manager    { background: #dcfce7; color: #166534; }
        .badge-tester     { background: #fef9c3; color: #854d0e; }

        /* ── Action button ── */
        .btn-raise {
            padding: 6px 14px;
            background: linear-gradient(135deg, #059669, #0d9488);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: .8rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity .2s;
        }
        .btn-raise:hover { opacity: .85; }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 14px; }
        .empty-state p { font-size: 1rem; margin-bottom: 20px; }
    </style>
</head>
<body>

<!-- ── Navigation Bar ── -->
<nav class="navbar">
    <div class="brand">🏢 Employee Management</div>
    <div class="nav-right">
        <span class="welcome">
            👤 Welcome, <strong sec:authentication="name">Admin</strong>
        </span>
        <!-- Logout — POST required by Spring Security CSRF -->
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn-logout">🚪 Logout</button>
        </form>
    </div>
</nav>

<!-- ── Main Content ── -->
<div class="container">

    <!-- Page header with Create button -->
    <div class="page-header">
        <h2>👥 All Employees</h2>
        <a th:href="@{/employees/new}" class="btn-primary">➕ Create Employee</a>
    </div>

    <!-- Success flash message (shown after create / raise salary) -->
    <div class="alert alert-success" th:if="${successMessage}">
        ✅ <span th:text="${successMessage}"></span>
    </div>

    <!-- Info message when no employees exist yet -->
    <div class="alert alert-info" th:if="${noEmployeesMessage}">
        ℹ️ <span th:text="${noEmployeesMessage}"></span>
    </div>


    <!-- Employees table (only shown when there are employees) -->
    <div class="table-card" th:if="${not #lists.isEmpty(employees)}">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Designation</th>
                    <th>Salary (₹)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="emp : ${employees}">
                    <td th:text="${emp.id}">1</td>
                    <td><strong th:text="${emp.name}">John Doe</strong></td>
                    <td th:text="${emp.age}">25</td>
                    <td>
                        <!-- Colour-coded badge based on designation -->
                        <span class="badge"
                              th:classappend="${emp.designation == 'Programmer'} ? 'badge-programmer' :
                                             (${emp.designation == 'Manager'}    ? 'badge-manager'    :
                                              'badge-tester')"
                              th:text="${emp.designation}">Programmer</span>
                    </td>
                    <td th:text="${#numbers.formatDecimal(emp.salary, 1, 2)}">20000.00</td>
                    <td>
                        <a th:href="@{/employees/raise/{id}(id=${emp.id})}"
                           class="btn-raise">💰 Raise Salary</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty state (only shown when list is empty) -->
    <div class="empty-state" th:if="${#lists.isEmpty(employees)}">
        <div class="empty-icon">📋</div>
        <p>No employees have been added yet.</p>
        <a th:href="@{/employees/new}" class="btn-primary">➕ Create Your First Employee</a>
    </div>

</div><!-- /container -->

</body>
</html>
